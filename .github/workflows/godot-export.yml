name: Godot Android Export
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Godot Android export
        uses: freecodecamp/godot-export@v1
        with:
          godot-version: '4.4'
          android-sdk: true
          android-keystore: androiddebugkey
          android-keystore-password: androiddebugkey
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: export/*.apk