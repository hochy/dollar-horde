name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: 34.0.0
      
      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass androiddebugkey -keypass androiddebugkey \
            -dname "CN=Android Debug,O=Android,C=US"
      
      - name: Download Godot
        run: |
          curl -L -o godot.zip https://downloads.tuxfamily.org/godotengine/4.4/Godot_v4.4-stable_linux_x86_64.zip
          unzip -q godot.zip
          chmod +x Godot_v4.4-stable_linux_x86_64/Godot*x86_64
      
      - name: Download export templates
        run: |
          curl -L -o templates.zip https://downloads.tuxfamily.org/godotengine/4.4/export_templates-4.4-stable.zip
          mkdir -p ~/.local/share/godot/export_templates/4.4.stable
          unzip -q templates.zip -d ~/.local/share/godot/export_templates/4.4.stable
      
      - name: Export APK
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
          JAVA_HOME: ${{ runner.temp }}/java11
        run: |
          mkdir -p export
          ./Godot_v4.4-stable_linux_x86_64/Godot*x86_64 \
            --headless --export-debug "Android" export/DollarHorde.apk 2>&1 || echo "Export failed"
          ls -la export/ || true
          find export -name "*.apk" || echo "No APK found"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: export/*.apk || true