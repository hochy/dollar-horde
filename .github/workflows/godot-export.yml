name: Godot Export
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate project structure
        run: |
          ls -la
          find . -name "*.gd" -o -name "*.tscn" | head -20
      
      - uses: chickensoft-games/godot-ci@v3
        with:
          version: 4.4.stable.mono
          export-templates: false
          android: true
      
      - name: Build APK
        run: |
          godot --headless --path . --export-debug Android build/dollar_horde-debug.apk
      
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/*.apk
      
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/*.html build/*.js build/*.wasm