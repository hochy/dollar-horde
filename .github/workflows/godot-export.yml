name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Godot Android build
        uses: barichello/godot-ci/.github/actions/godot-build-android@master
        with:
          godot-version: '4.4'
          export-name: 'Android'
          android-package-name: 'dollarhorde'
          android-package-id: 'com.thedronedemon.dollarhorde'
      
      - uses: actions/upload-artifact@v4
        with:
          name: dollar-horde-apk
          path: export/*.apk || true