name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass androiddebugkey -keypass androiddebugkey \
            -dname "CN=Android Debug,O=Android,C=US"
      
      - name: Build APK with Godot
        uses: chickensoft-games/godot-ci-actions/.github/actions/godot-build-android@main
        with:
          source-path: .
          godot-version: '4.4'
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dollar-horde-apk
          path: export/*.apk || ""