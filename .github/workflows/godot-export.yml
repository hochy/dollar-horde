name: Godot Export
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: chickensoft-games/godot-ci@v3
        with:
          version: 4.4.stable
          export-templates: true
          android: true
      
      - name: Build APK
        run: |
          godot --headless --path . --export-debug Android build/dollar_horde-debug.apk
      
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/*.apk